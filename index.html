<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Diário - Meta Ads</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f2f4f7;
    margin: 0;
    padding: 30px 15px;
    color: #1a1a1a;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 4px;
  }
  p.subtitle {
    color: #666;
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .card {
    background: #fff;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 14px;
  }
  textarea {
    width: 100%;
    min-height: 160px;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  button {
    margin-top: 14px;
    background: #1877f2;
    color: #fff;
    border: none;
    padding: 12px 22px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #145dbf; }
  button.secondary {
    background: #e4e6eb;
    color: #1a1a1a;
    margin-left: 10px;
  }
  button.secondary:hover { background: #d3d5da; }
  #output {
    white-space: pre-wrap;
    font-family: 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.7;
    background: #fafafa;
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 16px;
    min-height: 40px;
  }
  .warn {
    color: #b45309;
    font-size: 13px;
    margin-top: 10px;
  }
  .hidden { display: none; }
  #imgWrapper svg { width: 100%; height: auto; display: block; border-radius: 6px; }
</style>
</head>
<body>
<div class="container">
  <h1>📊 Relatório Diário</h1>
  <p class="subtitle">Cole abaixo o texto copiado do Meta Ads Manager</p>

  <div class="card">
    <label for="input">Dados colados</label>
    <textarea id="input" placeholder="Cole aqui o texto do Meta Ads..."></textarea>
    <div>
      <button onclick="gerarRelatorio()">Gerar relatório</button>
      <button class="secondary" onclick="limpar()">Limpar</button>
    </div>
    <div id="warnBox" class="warn hidden"></div>
  </div>

  <div class="card">
    <label>Relatório (texto)</label>
    <div id="output">Aguardando dados...</div>
    <button class="secondary" id="copyBtn" onclick="copiarRelatorio()" style="margin-top:14px;">Copiar relatório</button>
  </div>

  <div class="card">
    <label>Relatório (imagem 1080x1080)</label>
    <div id="imgWrapper" style="max-width:420px; margin:0 auto;"></div>
    <div style="margin-top:14px;">
      <button id="copyImgBtn" onclick="copiarImagem()">📋 Copiar imagem</button>
      <button class="secondary" id="downloadBtn" onclick="baixarImagem()">Baixar imagem PNG</button>
    </div>
  </div>
</div>

function parseNumberBR(str) {
  if (!str) return null;
  let s = str.trim();
  s = s.replace(/R\$\s?/gi, '').trim();
  // Brazilian format: 1.234,56  -> remove thousand dots, comma to dot
  if (/\d+\.\d{3}(\.\d{3})*(,\d+)?$/.test(s) || /,\d+$/.test(s)) {
    s = s.replace(/\./g, '').replace(',', '.');
  } else {
    s = s.replace(/,/g, '');
  }
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function findValue(text, labels) {
  const lines = text.split('\n');
  for (let label of labels) {
    // Try "Label: value" or "Label value" or "Label" on one line and value on next
    const regex = new RegExp(label + '\\s*[:\\-]?\\s*(R\\$\\s?[\\d.,]+|[\\d.,]+)', 'i');
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const match = line.match(regex);
      if (match) {
        return match[1];
      }
      // Label alone on a line, value on next non-empty line
      const labelOnlyRegex = new RegExp('^\\s*' + label + '\\s*$', 'i');
      if (labelOnlyRegex.test(line)) {
        for (let j = i + 1; j < lines.length; j++) {
          const next = lines[j].trim();
          if (next === '') continue;
          const valMatch = next.match(/(R\$\s?[\d.,]+|[\d.,]+)/);
          if (valMatch) return valMatch[1];
          break;
        }
      }
    }
  }
  return null;
}

function extractTotalsBlock(text) {
  // Meta Ads export: the aggregated totals block starts with "Resultados de N campanhas"
  // and lists VALUES BEFORE their labels, in this order:
  // leads, custo por resultado, valor usado (investimento), impressões, alcance
  const lines = text.split('\n').map(l => l.trim());
  let startIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (/^Resultados de \d+ campanhas?$/i.test(lines[i])) {
      startIdx = i;
      break;
    }
  }
  if (startIdx === -1) return null;

  const values = [];
  const valueLineRegex = /^(R\$\s?[\d.,]+|[\d.,]+)$/;
  const stopWords = /^(Contas Meta|Configuração|Estratégia)/i;

  for (let i = startIdx + 1; i < lines.length && values.length < 5; i++) {
    const line = lines[i];
    if (line === '' || /^Ocultar resultados$/i.test(line)) continue;
    if (stopWords.test(line)) break;
    if (valueLineRegex.test(line)) {
      values.push(line);
    }
    // otherwise it's a label line (e.g. "Conversas por mensagem iniciadas", "Total usado", "Total") — skip it
  }

  if (values.length < 5) return null;

  return {
    leads: values[0],
    custoPorLead: values[1],
    investimento: values[2],
    impressoes: values[3],
    alcance: values[4]
  };
}

function formatInt(n) {
  if (n === null) return null;
  return Math.round(n).toLocaleString('pt-BR');
}

function formatCurrency(n) {
  if (n === null) return null;
  return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function gerarRelatorio() {
  const text = document.getElementById('input').value;
  const warnBox = document.getElementById('warnBox');
  const output = document.getElementById('output');

  if (!text.trim()) {
    output.textContent = 'Cole os dados do Meta Ads antes de gerar o relatório.';
    warnBox.classList.add('hidden');
    return;
  }

  const totals = extractTotalsBlock(text);

  let impressoesRaw, alcanceRaw, leadsRaw, custoPorLeadRaw, investimentoRaw;
  if (totals) {
    impressoesRaw = totals.impressoes;
    alcanceRaw = totals.alcance;
    leadsRaw = totals.leads;
    custoPorLeadRaw = totals.custoPorLead;
    investimentoRaw = totals.investimento;
  } else {
    impressoesRaw = findValue(text, ['Impress(?:ões|oes|ão|ao)']);
    alcanceRaw = findValue(text, ['Alcance']);
    leadsRaw = findValue(text, ['Resultados?', 'Leads?', 'Cadastros?']);
    custoPorLeadRaw = findValue(text, ['Custo por resultados?', 'Custo por lead', 'Custo por resultado']);
    investimentoRaw = findValue(text, ['Valor usado(?: \\(BRL\\))?', 'Investimento', 'Custo total', 'Total gasto', 'Gasto']);
  }

  const impressoes = parseNumberBR(impressoesRaw);
  const alcance = parseNumberBR(alcanceRaw);
  const leads = parseNumberBR(leadsRaw);
  let custoPorLead = parseNumberBR(custoPorLeadRaw);
  const investimento = parseNumberBR(investimentoRaw);

  // If custo por lead not found but we have investimento and leads, calculate it
  if (custoPorLead === null && investimento !== null && leads) {
    custoPorLead = investimento / leads;
  }

  const missing = [];
  if (impressoes === null) missing.push('Impressões');
  if (alcance === null) missing.push('Alcance');
  if (leads === null) missing.push('Leads');
  if (custoPorLead === null) missing.push('Custo por lead');
  if (investimento === null) missing.push('Investimento do dia');

  if (missing.length > 0) {
    warnBox.textContent = '⚠ Não encontrado automaticamente: ' + missing.join(', ') + '. Verifique o texto colado ou ajuste manualmente no relatório abaixo.';
    warnBox.classList.remove('hidden');
  } else {
    warnBox.classList.add('hidden');
  }

  const ontem = new Date();
  ontem.setDate(ontem.getDate() - 1);
  const hoje = ontem.toLocaleDateString('pt-BR');

  const relatorio =
`Relatório Diário - ${hoje}

Impressões: ${impressoes !== null ? formatInt(impressoes) : '—'}
Alcance: ${alcance !== null ? formatInt(alcance) : '—'}
Leads: ${leads !== null ? formatInt(leads) : '—'}
Custo por lead: ${custoPorLead !== null ? formatCurrency(custoPorLead) : '—'}
Investimento do dia: ${investimento !== null ? formatCurrency(investimento) : '—'}`;

  output.textContent = relatorio;

  gerarImagem(hoje, impressoes, alcance, leads, custoPorLead, investimento);
}

function svgEsc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
}

  const cx = cardX + 330;

  const stageH = 112;
  const gap = 8;
  const stageTopW = [500, 380, 260, 150];

  function trapezoid(topW, botW, y) {
    const x1 = cx - topW / 2, x2 = cx + topW / 2;
    const x3 = cx + botW / 2, x4 = cx - botW / 2;
    const yb = y + stageH;
    return `${x1},${y} ${x2},${y} ${x3},${yb} ${x4},${yb}`;

    y += stageH + gap;

  const row1Y = funnelTop + stageH / 2;
  const row2Y = funnelTop + stageH + gap + stageH / 2;

  <!-- Scalles logo watermark behind funnel -->

  <!-- Funnel -->

  <text x="${panelBarX - 22}" y="${panel2Y - 18}" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#ffffff" text-anchor="end">Custo por</text>
  <text x="${panelBarX - 22}" y="${panel2Y + 10}" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#ffffff" text-anchor="end">lead</text>
  <text x="${panelRight}" y="${panel2Y + 38}" font-family="Segoe UI, Arial" font-size="26" font-weight="800" fill="${RED}" text-anchor="end">${svgEsc(custoTxt)}</text>

  <!-- Bottom-right decorative corner -->
  <polygon points="${W},${H} ${W},${H-110} ${W-110},${H}" fill="${RED_DARK}" opacity="0.6"/>
</svg>`;

  const wrapper = document.getElementById('imgWrapper');
  wrapper.innerHTML = svg;
  wrapper._svgSource = svg;
}

function svgToPngBlob(callback) {
  const wrapper = document.getElementById('imgWrapper');
  const svgEl = wrapper.querySelector('svg');
  if (!svgEl) { alert('Gere o relatório primeiro.'); return; }

  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svgEl);
  const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);

  const W = svgEl.viewBox.baseVal.width || 1080;
  const H = svgEl.viewBox.baseVal.height || 1080;

  const img = new Image();
  img.onload = function () {
    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);
    canvas.toBlob(function (blob) {
      callback(blob);
    }, 'image/png');
  };
  img.src = url;
}

function baixarImagem() {
  svgToPngBlob(function (blob) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'relatorio-diario.png';
    a.click();
  });
}

function copiarImagem() {
  svgToPngBlob(async function (blob) {
    try {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      const btn = document.getElementById('copyImgBtn');
      const original = btn.textContent;
      btn.textContent = 'Imagem copiada!';
      setTimeout(() => { btn.textContent = original; }, 1500);
    } catch (e) {
      alert('Não foi possível copiar a imagem automaticamente. Use o botão "Baixar imagem" como alternativa.');
    }
  });
}

function limpar() {
  document.getElementById('input').value = '';
  document.getElementById('output').textContent = 'Aguardando dados...';
  document.getElementById('warnBox').classList.add('hidden');
}

function copiarRelatorio() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const original = btn.textContent;
    btn.textContent = 'Copiado!';
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
}
</script>
</body>
</html>
